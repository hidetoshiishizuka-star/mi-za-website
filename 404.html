<!DOCTYPE html>
<html lang="ja">
<head>
  <!-- Subpath-aware base for GitHub Pages preview -->
  <script>
    (function() {
      var seg = window.location.pathname.split('/')[1] || '';
      var base = '/';
      if (window.location.hostname.endsWith('.github.io') && seg) {
        base = '/' + seg + '/';
      }
      document.write('<base href="' + base + '">');
    })();
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>ページが見つかりません｜MI-ZA（ミーザ）</title>
  <link rel="canonical" href="https://mi-za.org" />
  <link rel="icon" type="image/png" href="mi-za-icon.png" />
  <meta name="theme-color" content="#1B2A4A" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      background: #1B2A4A;
      color: #FFFFFF;
      font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
      line-height: 1.7;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }
    .wrap { max-width: 560px; text-align: center; }
    .code {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 96px;
      font-weight: 600;
      letter-spacing: 6px;
      color: #B8963E;
      line-height: 1;
      margin: 0 0 16px;
    }
    .label {
      font-family: 'Cormorant Garamond', Georgia, serif;
      font-size: 14px;
      letter-spacing: 4px;
      color: #B8963E;
      text-transform: uppercase;
      margin: 0 0 28px;
    }
    h1 {
      font-size: 22px;
      font-weight: 700;
      margin: 0 0 16px;
    }
    p { font-size: 14px; color: #C7CDD9; margin: 0 0 28px; }
    .btn {
      display: inline-block;
      background: #B8963E;
      color: #1B2A4A;
      padding: 14px 32px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 2px;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #C9A95A; }
    .divider {
      width: 40px;
      height: 1px;
      background: #B8963E;
      margin: 0 auto 24px;
    }
    @media (max-width: 480px) {
      .code { font-size: 72px; }
      h1 { font-size: 18px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <p class="code">404</p>
    <div class="divider"></div>
    <p class="label">PAGE NOT FOUND</p>
    <h1>お探しのページが見つかりませんでした</h1>
    <p>URL が変更されたか、ページが削除された可能性があります。<br />お手数ですがトップページからもう一度お探しください。</p>
    <a class="btn" href="/">トップページへ戻る</a>
  </main>
</body>
</html>
