      transform-origin: center;
      animation: mzWhyPulse 3.5s 3s ease-in-out infinite;
    }
    .why-accent::after {
      content: '';
      position: absolute;
      left: 0; bottom: -4px;
      height: 3px;
      width: 100%;
      background: linear-gradient(90deg, transparent 0%, #B89A4D 20%, #FFD466 50%, #B89A4D 80%, transparent 100%);

    }
    .why-accent-2::after { animation-delay: 1.0s, 3.0s; }
    .why-accent-3::after { animation-delay: 1.5s, 3.5s; }
    @keyframes mzDraw { from { transform: scaleX(0); } to { transform: scaleX(1); } }
    @keyframes mzShimmerLine {
      0% { background-position: 200% 0; }
      100% { background-position: -100% 0; }
    }
    @keyframes mzWhyPulse {
      0%, 100% { transform: scale(1); text-shadow: 0 0 0 transparent; }
