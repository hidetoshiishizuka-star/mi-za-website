        <p>在宅医療・訪問診療クリニック専門のコンサルティング会社 株式会社MI-ZA（ミーザ）。在宅医療事務長10年の現場経験と生成AIを組み合わせ、院長・看護師・事務に並走し、自院に育つAIで日々を支えるサービスを提供しています。</p>

        <h2>こんな状況、ありませんか？</h2>
        <ul>
          <li>院長がいないと動かない（訪問診療中の判断集中、スタッフが院長の帰りを待っている状態）</li>
          <li>忙しいのに利益が残らない（人件費比率が把握できていない）</li>
          <li>看護師や医事の連鎖退職が発生している</li>
          <li>算定できているはずの加算が、取れていない</li>
        </ul>
      </section>

      <section>
        <h2>それぞれの課題に、MI-ZAはこう応えます</h2>
        <ul>
          <li>院長依存の解消: スタッフが判断できる仕組みづくり、事務長機能の代行・育成</li>
          <li>利益体質への転換: 月次の損益・人件費・単価を可視化、生成AIによる業務自動化</li>
          <li>連鎖退職への対策: 業務分担最適化、AIで事務負荷を軽減し、看護師が看護に専念できる環境を構築</li>
          <li>加算の取りこぼし防止: レセファイル分析、1号用紙・2号用紙のAI自動収集、診療報酬改定シミュレーション</li>
        </ul>
      </section>
